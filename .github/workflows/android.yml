name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show files
        run: ls -R

      - name: Build APK
        working-directory: OverlayLauncherApp_build_ready_source
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug || gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: OverlayLauncherApp_build_ready_source/app/build/outputs/apk/debug/*.apk
